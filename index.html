<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏇 CGA部活ダービー　3連単チャレンジ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Oswald:wght@400;600;700&display=swap');

  :root {
    --navy: #1A1A2E;
    --surface: #16213E;
    --card: #0F3460;
    --red: #E63946;
    --gold: #F4D03F;
    --gold-dim: #b89d2a;
    --white: #EAEAEA;
    --muted: #8899AA;
    --green: #2ECC71;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--surface);
    border-bottom: 3px solid var(--red);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Oswald', sans-serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .tab-switcher {
    display: flex;
    gap: 8px;
  }

  .tab-btn {
    padding: 8px 20px;
    border: 2px solid var(--muted);
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(244,208,63,0.1);
  }

  /* ===== PASSWORD MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.show { display: flex; }

  .modal-box {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px;
    padding: 36px 32px;
    width: 100%;
    max-width: 360px;
    text-align: center;
    animation: slideUp 0.25s ease-out;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-icon { font-size: 2.4rem; margin-bottom: 12px; }

  .modal-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.3rem;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .modal-sub {
    color: var(--muted);
    font-size: 0.82rem;
    margin-bottom: 24px;
  }

  .pw-input {
    width: 100%;
    padding: 14px 16px;
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--white);
    font-size: 1.1rem;
    text-align: center;
    letter-spacing: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }

  .pw-input:focus { outline: none; border-color: var(--gold); }

  .pw-input.error { border-color: var(--red); animation: shake 0.3s ease; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-8px); }
    75%      { transform: translateX(8px); }
  }

  .btn-pw-submit {
    width: 100%;
    padding: 13px;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Oswald', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 1px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-pw-submit:hover { background: #e8c332; }

  .btn-pw-cancel {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    text-decoration: underline;
  }

  .pw-error-msg {
    color: var(--red);
    font-size: 0.82rem;
    margin-bottom: 10px;
    min-height: 18px;
  }

  /* 管理タブのロックアイコン */
  .lock-icon { font-size: 0.8rem; margin-right: 2px; }

  /* ===== PAGES ===== */
  .page { display: none; padding: 32px 24px; max-width: 680px; margin: 0 auto; }
  .page.active { display: block; }

  /* ===== ENTRY PAGE ===== */
  .page-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.8rem;
    font-weight: 600;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .page-sub {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
  }

  .card {
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 24px;
  }

  .form-label {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  .form-input:focus {
    outline: none;
    border-color: var(--gold);
  }

  .bet-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .bet-slot {
    text-align: center;
  }

  .bet-slot label {
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .badge-1 { color: #FFD700; }
  .badge-2 { color: #C0C0C0; }
  .badge-3 { color: #CD7F32; }

  .horse-input {
    width: 100%;
    padding: 16px 8px;
    background: var(--card);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--white);
    font-family: 'Oswald', sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    -moz-appearance: textfield;
  }

  .horse-input::-webkit-outer-spin-button,
  .horse-input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .horse-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(244,208,63,0.15); }

  .btn-primary {
    width: 100%;
    padding: 16px;
    background: var(--red);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 2px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary:hover { background: #c0303b; transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }

  /* success message */
  .success-msg {
    display: none;
    background: rgba(46,204,113,0.15);
    border: 2px solid var(--green);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    color: var(--green);
    font-weight: 700;
    font-size: 1rem;
    margin-top: 16px;
  }

  /* entries list (on entry page) */
  .entries-count {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 12px;
  }

  .entries-count span {
    color: var(--gold);
    font-weight: 700;
    font-size: 1.1rem;
  }

  /* ===== ADMIN PAGE ===== */
  .section-title {
    font-family: 'Oswald', sans-serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--gold);
    border-left: 4px solid var(--red);
    padding-left: 12px;
    margin-bottom: 16px;
  }

  .result-input-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .btn-judge {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--navy);
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 2px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-judge:hover { background: #e8c332; transform: translateY(-1px); }

  .btn-reset {
    width: 100%;
    padding: 10px;
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    border: 1px solid var(--muted);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 24px;
  }

  .btn-reset:hover { border-color: var(--red); color: var(--red); }

  /* horse animation */
  .horse-track {
    display: none;
    background: linear-gradient(90deg, #1a4a1a 0%, #2d7a2d 50%, #1a4a1a 100%);
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 24px;
    overflow: hidden;
    position: relative;
    height: 52px;
    align-items: center;
  }

  .horse-track.show { display: flex; }

  .horse-emoji {
    font-size: 2rem;
    position: absolute;
    animation: gallop 1.8s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes gallop {
    0%   { left: -60px; }
    100% { left: calc(100% - 60px); }
  }

  .track-label {
    color: rgba(255,255,255,0.5);
    font-size: 0.75rem;
    font-style: italic;
    position: absolute;
    right: 16px;
    bottom: 6px;
  }

  /* results panel */
  .result-panel {
    display: none;
    margin-top: 8px;
  }

  .result-panel.show { display: block; }

  .result-answer {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(244,208,63,0.08);
    border: 1px solid rgba(244,208,63,0.3);
    border-radius: 8px;
    padding: 14px 20px;
    margin-bottom: 20px;
  }

  .result-answer-label {
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  .result-answer-nums {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .ans-num {
    background: var(--gold);
    color: var(--navy);
    font-family: 'Oswald', sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ans-arrow {
    color: var(--gold);
    font-size: 1.2rem;
  }

  /* winner / losers list */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .count-badge {
    background: var(--red);
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 12px;
  }

  .entry-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 8px;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s;
  }

  .entry-item.winner {
    background: rgba(244,208,63,0.12);
    border-color: var(--gold);
    animation: popIn 0.4s ease-out;
  }

  @keyframes popIn {
    0% { transform: scale(0.95); opacity: 0; }
    70% { transform: scale(1.02); }
    100% { transform: scale(1); opacity: 1; }
  }

  .entry-name {
    font-weight: 700;
    font-size: 1rem;
  }

  .winner .entry-name { color: var(--gold); }

  .entry-bet {
    font-family: 'Oswald', sans-serif;
    font-size: 1.1rem;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .winner .entry-bet { color: var(--gold); }

  .winner-crown {
    font-size: 1.4rem;
    margin-left: 8px;
  }

  /* all entries compact */
  .all-entries-list {
    max-height: 300px;
    overflow-y: auto;
  }

  .all-entries-list::-webkit-scrollbar { width: 4px; }
  .all-entries-list::-webkit-scrollbar-track { background: var(--navy); }
  .all-entries-list::-webkit-scrollbar-thumb { background: var(--card); border-radius: 2px; }

  /* export */
  .btn-export {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: transparent;
    color: var(--white);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
  }

  .btn-export:hover { border-color: var(--white); background: rgba(255,255,255,0.05); }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 32px;
    font-size: 0.9rem;
  }

  .no-winner-msg {
    text-align: center;
    color: var(--muted);
    padding: 24px;
    font-size: 0.9rem;
    border: 2px dashed rgba(255,255,255,0.1);
    border-radius: 8px;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    header { padding: 12px 16px; }
    .logo { font-size: 1.2rem; }
    .tab-btn { padding: 6px 14px; font-size: 0.78rem; }
    .page { padding: 24px 16px; }
    .horse-input { font-size: 1.4rem; padding: 12px 4px; }
  }
</style>
</head>
<body>

<!-- ========== PASSWORD MODAL ========== -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal-box">
    <div class="modal-icon">🔐</div>
    <div class="modal-title">管理者パスワード</div>
    <div class="modal-sub">このページは管理者のみアクセスできます</div>
    <input class="pw-input" id="pw-input" type="password" placeholder="パスワードを入力"
      onkeydown="if(event.key==='Enter')checkPassword()">
    <div class="pw-error-msg" id="pw-error"></div>
    <button class="btn-pw-submit" onclick="checkPassword()">確認する</button>
    <br>
    <button class="btn-pw-cancel" onclick="closePwModal()">キャンセル</button>
  </div>
</div>

<header>
  <div class="logo">🏇 CGA部活ダービー　3連単チャレンジ</div>
  <div class="tab-switcher">
    <button class="tab-btn active" onclick="showPage('entry', event)">予想入力</button>
    <button class="tab-btn" id="admin-tab-btn" onclick="requestAdminAccess(event)"><span class="lock-icon" id="admin-lock">🔒</span>管理・結果</button>
  </div>
</header>

<!-- ========== ENTRY PAGE ========== -->
<div class="page active" id="page-entry">
  <div class="page-title">予想を入力</div>
  <p class="page-sub">1着・2着・3着の馬番を入力して送信してください。</p>

  <div class="card">
    <label class="form-label">あなたのEID</label>
    <input class="form-input" id="entry-name" type="text" placeholder="例）yuji.yurino" maxlength="30">

    <div style="margin-bottom: 8px;">
      <span class="form-label">3連単 予想</span>
    </div>
    <div class="bet-row">
      <div class="bet-slot">
        <label class="badge-1">🥇 1着</label>
        <input class="horse-input" id="bet1" type="number" min="1" max="18" placeholder="—">
      </div>
      <div class="bet-slot">
        <label class="badge-2">🥈 2着</label>
        <input class="horse-input" id="bet2" type="number" min="1" max="18" placeholder="—">
      </div>
      <div class="bet-slot">
        <label class="badge-3">🥉 3着</label>
        <input class="horse-input" id="bet3" type="number" min="1" max="18" placeholder="—">
      </div>
    </div>

    <button class="btn-primary" onclick="submitEntry()">🎯 予想を登録する</button>
    <div class="success-msg" id="success-msg">✅ 登録しました！結果をお楽しみに！</div>
  </div>

  <div class="card">
    <div class="entries-count">現在の参加者数：<span id="entry-count">0</span> 名</div>
    <div class="all-entries-list" id="entry-preview">
      <div class="empty-state">まだ誰も参加していません</div>
    </div>
  </div>
</div>

<!-- ========== ADMIN PAGE ========== -->
<div class="page" id="page-admin">
  <div class="page-title">管理・結果発表</div>
  <p class="page-sub">正解の馬番を入力して「判定する」を押してください。</p>

  <div class="card">
    <div class="section-title">正解を入力</div>
    <div class="result-input-row">
      <div class="bet-slot">
        <label class="badge-1">🥇 1着</label>
        <input class="horse-input" id="ans1" type="number" min="1" max="18" placeholder="—">
      </div>
      <div class="bet-slot">
        <label class="badge-2">🥈 2着</label>
        <input class="horse-input" id="ans2" type="number" min="1" max="18" placeholder="—">
      </div>
      <div class="bet-slot">
        <label class="badge-3">🥉 3着</label>
        <input class="horse-input" id="ans3" type="number" min="1" max="18" placeholder="—">
      </div>
    </div>
    <button class="btn-judge" onclick="judgeResults()">🏆 判定する</button>
    <button class="btn-reset" onclick="resetAll()">⚠️ 全データをリセット</button>
  </div>

  <!-- Horse animation -->
  <div class="horse-track" id="horse-track">
    <span class="horse-emoji" id="horse-emoji">🏇</span>
    <span class="track-label">結果発表中…</span>
  </div>

  <!-- Result panel -->
  <div class="result-panel" id="result-panel">

    <!-- Answer display -->
    <div class="result-answer">
      <span class="result-answer-label">確定</span>
      <div class="result-answer-nums">
        <div class="ans-num" id="disp-ans1">—</div>
        <span class="ans-arrow">→</span>
        <div class="ans-num" id="disp-ans2">—</div>
        <span class="ans-arrow">→</span>
        <div class="ans-num" id="disp-ans3">—</div>
      </div>
    </div>

    <!-- Winners -->
    <div class="list-header">
      <div class="section-title" style="margin-bottom:0">🎉 的中者</div>
      <span class="count-badge" id="winner-count">0名</span>
    </div>
    <div id="winner-list" style="margin-bottom:24px"></div>

    <!-- All entries -->
    <div class="list-header">
      <div class="section-title" style="margin-bottom:0">📋 全参加者</div>
      <div style="display:flex;gap:8px">
        <button class="btn-export" onclick="copyResults()">📋 コピー</button>
        <button class="btn-export" onclick="downloadCSV()">⬇ CSV</button>
      </div>
    </div>
    <div class="all-entries-list" id="all-entries-result"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ===== FIREBASE CONFIG =====
  const firebaseConfig = {
    apiKey: "AIzaSyA5HftQeCBj9Qp8brtbRvBeuixGuvxJ3tc",
    authDomain: "cga-derby.firebaseapp.com",
    databaseURL: "https://cga-derby-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "cga-derby",
    storageBucket: "cga-derby.firebasestorage.app",
    messagingSenderId: "516232962954",
    appId: "1:516232962954:web:cebd275f003e2959fd5e73"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // ===== DATA STORE（リアルタイム同期）=====
  let entries = [];

  // Firebaseからリアルタイムでデータを受信
  onValue(ref(db, 'entries'), (snapshot) => {
    const data = snapshot.val();
    entries = data ? Object.values(data) : [];
    renderEntryPreview();
  });

  async function saveEntry(entry) {
    // EIDをキーにして保存（上書き対応）
    const key = entry.name.replace(/\./g, '_');
    await set(ref(db, 'entries/' + key), entry);
  }

  async function deleteAllEntries() {
    await remove(ref(db, 'entries'));
  }

  // ===== PASSWORD =====
  const ADMIN_PASSWORD = 'chihiro0822';
  let adminUnlocked = false;

  window.requestAdminAccess = function(e) {
    if (adminUnlocked) { showPage('admin', e); return; }
    document.getElementById('pw-modal').classList.add('show');
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    setTimeout(() => document.getElementById('pw-input').focus(), 100);
  };

  window.checkPassword = function() {
    const val = document.getElementById('pw-input').value;
    if (val === ADMIN_PASSWORD) {
      adminUnlocked = true;
      document.getElementById('pw-modal').classList.remove('show');
      document.getElementById('admin-lock').textContent = '🔓';
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('page-admin').classList.add('active');
      document.getElementById('admin-tab-btn').classList.add('active');
    } else {
      const input = document.getElementById('pw-input');
      document.getElementById('pw-error').textContent = 'パスワードが違います';
      input.classList.add('error');
      input.value = '';
      setTimeout(() => { input.classList.remove('error'); input.focus(); }, 400);
    }
  };

  window.closePwModal = function() {
    document.getElementById('pw-modal').classList.remove('show');
  };

  // ===== TAB SWITCH =====
  window.showPage = function(name, e) {
    const ev = e || event;
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    if (ev && ev.currentTarget) ev.currentTarget.classList.add('active');
  };

  // ===== SUBMIT ENTRY =====
  window.submitEntry = async function() {
    const name = document.getElementById('entry-name').value.trim();
    const b1 = parseInt(document.getElementById('bet1').value);
    const b2 = parseInt(document.getElementById('bet2').value);
    const b3 = parseInt(document.getElementById('bet3').value);

    if (!name) { alert('EIDを入力してください'); return; }
    if (!b1 || !b2 || !b3) { alert('馬番（1着・2着・3着）をすべて入力してください'); return; }
    if (b1 < 1 || b1 > 18 || b2 < 1 || b2 > 18 || b3 < 1 || b3 > 18) {
      alert('馬番は1〜18の範囲で入力してください'); return;
    }
    if (b1 === b2 || b2 === b3 || b1 === b3) {
      alert('1着・2着・3着は異なる馬番を入力してください'); return;
    }

    if (entries.find(e => e.name === name)) {
      if (!confirm(`「${name}」はすでに登録済みです。上書きしますか？`)) return;
    }

    const entry = { name, bet: [b1, b2, b3], time: new Date().toLocaleTimeString('ja-JP') };
    await saveEntry(entry);

    document.getElementById('entry-name').value = '';
    document.getElementById('bet1').value = '';
    document.getElementById('bet2').value = '';
    document.getElementById('bet3').value = '';

    const msg = document.getElementById('success-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 3000);
  };

  // ===== RENDER ENTRY PREVIEW =====
  function renderEntryPreview() {
    document.getElementById('entry-count').textContent = entries.length;
    const container = document.getElementById('entry-preview');
    if (entries.length === 0) {
      container.innerHTML = '<div class="empty-state">まだ誰も参加していません</div>';
      return;
    }
    container.innerHTML = entries.map(e =>
      `<div class="entry-item">
        <span class="entry-name">${escHtml(e.name)}</span>
        <span class="entry-bet">${e.bet[0]} → ${e.bet[1]} → ${e.bet[2]}</span>
      </div>`
    ).join('');
  }

  // ===== JUDGE =====
  window.judgeResults = function() {
    const a1 = parseInt(document.getElementById('ans1').value);
    const a2 = parseInt(document.getElementById('ans2').value);
    const a3 = parseInt(document.getElementById('ans3').value);

    if (!a1 || !a2 || !a3) { alert('正解の馬番（1着・2着・3着）をすべて入力してください'); return; }
    if (a1 === a2 || a2 === a3 || a1 === a3) { alert('1着・2着・3着は異なる馬番にしてください'); return; }
    if (entries.length === 0) { alert('参加者がいません'); return; }

    const track = document.getElementById('horse-track');
    const horseEl = document.getElementById('horse-emoji');
    track.classList.add('show');
    horseEl.style.animation = 'none';
    void horseEl.offsetWidth;
    horseEl.style.animation = 'gallop 1.8s ease-out forwards';

    setTimeout(() => {
      track.classList.remove('show');
      showResults(a1, a2, a3);
    }, 2000);
  };

  function showResults(a1, a2, a3) {
    document.getElementById('disp-ans1').textContent = a1;
    document.getElementById('disp-ans2').textContent = a2;
    document.getElementById('disp-ans3').textContent = a3;

    const winners = entries.filter(e => e.bet[0] === a1 && e.bet[1] === a2 && e.bet[2] === a3);
    const losers  = entries.filter(e => !(e.bet[0] === a1 && e.bet[1] === a2 && e.bet[2] === a3));

    document.getElementById('winner-count').textContent = winners.length + '名';

    const wContainer = document.getElementById('winner-list');
    if (winners.length === 0) {
      wContainer.innerHTML = '<div class="no-winner-msg">😢 今回の的中者はいませんでした</div>';
    } else {
      wContainer.innerHTML = winners.map(e =>
        `<div class="entry-item winner">
          <span class="entry-name">${escHtml(e.name)}<span class="winner-crown">👑</span></span>
          <span class="entry-bet">${e.bet[0]} → ${e.bet[1]} → ${e.bet[2]}</span>
        </div>`
      ).join('');
    }

    const allContainer = document.getElementById('all-entries-result');
    allContainer.innerHTML = [...winners, ...losers].map(e => {
      const isW = e.bet[0] === a1 && e.bet[1] === a2 && e.bet[2] === a3;
      return `<div class="entry-item ${isW ? 'winner' : ''}">
        <span class="entry-name">${escHtml(e.name)}${isW ? ' 👑' : ''}</span>
        <span class="entry-bet">${e.bet[0]} → ${e.bet[1]} → ${e.bet[2]}</span>
      </div>`;
    }).join('');

    document.getElementById('result-panel').classList.add('show');
  }

  // ===== COPY =====
  window.copyResults = function() {
    const a1 = document.getElementById('disp-ans1').textContent;
    const a2 = document.getElementById('disp-ans2').textContent;
    const a3 = document.getElementById('disp-ans3').textContent;
    if (a1 === '—') { alert('先に判定を実行してください'); return; }

    const winners = entries.filter(e => e.bet[0] === parseInt(a1) && e.bet[1] === parseInt(a2) && e.bet[2] === parseInt(a3));
    let text = `【CGA部活ダービー　3連単チャレンジ 結果】\n確定：${a1}→${a2}→${a3}\n\n`;
    text += `■ 的中者（${winners.length}名）\n`;
    text += winners.length === 0 ? '（なし）\n' : winners.map(e => `・${e.name}　${e.bet.join('→')}`).join('\n') + '\n';
    text += `\n■ 全参加者（${entries.length}名）\n`;
    text += entries.map(e => `・${e.name}　${e.bet.join('→')}`).join('\n');

    navigator.clipboard.writeText(text).then(() => alert('📋 クリップボードにコピーしました！'));
  };

  // ===== CSV =====
  window.downloadCSV = function() {
    const a1 = document.getElementById('disp-ans1').textContent;
    const a2 = document.getElementById('disp-ans2').textContent;
    const a3 = document.getElementById('disp-ans3').textContent;
    const judged = a1 !== '—';

    let csv = 'EID,1着予想,2着予想,3着予想,登録時刻';
    if (judged) csv += ',的中';
    csv += '\n';

    entries.forEach(e => {
      const hit = judged ? (e.bet[0] === parseInt(a1) && e.bet[1] === parseInt(a2) && e.bet[2] === parseInt(a3)) : '';
      csv += `${e.name},${e.bet[0]},${e.bet[1]},${e.bet[2]},${e.time}`;
      if (judged) csv += `,${hit ? '◎' : '✕'}`;
      csv += '\n';
    });

    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'CGA部活ダービー結果.csv';
    a.click();
  };

  // ===== RESET =====
  window.resetAll = async function() {
    if (!confirm('全参加者データと結果をリセットします。よろしいですか？')) return;
    await deleteAllEntries();
    document.getElementById('ans1').value = '';
    document.getElementById('ans2').value = '';
    document.getElementById('ans3').value = '';
    document.getElementById('result-panel').classList.remove('show');
    document.getElementById('disp-ans1').textContent = '—';
    document.getElementById('disp-ans2').textContent = '—';
    document.getElementById('disp-ans3').textContent = '—';
    alert('リセットしました');
  };

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
